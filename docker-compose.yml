services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    environment:
      # Public IP for ICE candidates (cross-network). Set in .env:
      #   MTX_WEBRTCADDITIONALHOSTS=<your_server_public_ip>
      - MTX_WEBRTCADDITIONALHOSTS=${MTX_WEBRTCADDITIONALHOSTS:-}
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8189:8189/udp"   # WebRTC ICE media (UDP) — must be open in firewall
      - "8189:8189/tcp"   # WebRTC ICE media (TCP fallback)
    networks:
      - webservice

  livetrack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livetrack
    restart: unless-stopped
    ports:
      - "3888:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NODE_ENV=production
      - NEXT_PUBLIC_MEDIAMTX_URL=${NEXT_PUBLIC_MEDIAMTX_URL:-/api/mediamtx}
      - MEDIAMTX_INTERNAL_URL=http://mediamtx:8889
    volumes:
      - livetrack_data:/app/data
    networks:
      - webservice

networks:
  webservice:
    external: true

volumes:
  livetrack_data:
