# MediaMTX configuration for LiveTrack screen sharing
logLevel: info
logDestinations: [stdout]

# Disable unused protocols
rtsp: no
rtmp: no
hls: no
srt: no

# WebRTC (WHIP/WHEP)
webrtc: yes
webrtcAddress: :8889

# ICE STUN
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

# Single UDP/TCP port for ICE
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189

# Public IP for ICE candidates (required for cross-network WebRTC behind NAT/Docker).
# Set MTX_WEBRTCADDITIONALHOSTS=<public_ip> in .env — this env var overrides the
# placeholder below at runtime via MediaMTX's MTX_ prefix mechanism.
# If env var is not picked up, edit this file directly on the server.
webrtcAdditionalHosts: []

paths:
  all_others:
    source: publisher
