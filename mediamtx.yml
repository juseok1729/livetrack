# MediaMTX configuration for LiveTrack screen sharing
logLevel: info
logDestinations: [stdout]

# Disable unused protocols
rtsp: no
rtmp: no
hls: no
srt: no

# WebRTC (WHIP/WHEP)
webrtc: yes
webrtcAddress: :8889

# ICE STUN
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

# Single UDP/TCP port for ICE
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189

# webrtcAdditionalHosts is set via MTX_WEBRTCADDITIONALHOSTS env var
# in docker-compose so it's only applied when MEDIAMTX_EXTERNAL_IP is set.

paths:
  all_others:
    source: publisher
