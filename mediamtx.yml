# MediaMTX configuration for LiveTrack screen sharing
logLevel: info
logDestinations: [stdout]

# Disable unused protocols
rtsp: no
rtmp: no
hls: no
srt: no

# WebRTC (WHIP/WHEP)
webrtc: yes
webrtcAddress: :8889

# ICE STUN
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

# Single UDP/TCP port for ICE (v1.17+ names)
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189

# Public IP for NAT traversal (v1.17+ name)
# Set MEDIAMTX_EXTERNAL_IP in .env
webrtcAdditionalHosts:
  - ${MEDIAMTX_EXTERNAL_IP}

paths:
  all_others:
    source: publisher
